<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}KB Search{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scrollbar-gutter: stable; }

    :root {
      --bg: #f8f9fa;
      --surface: #ffffff;
      --border: #e0e0e0;
      --primary: #1a73e8;
      --primary-hover: #1558b0;
      --text: #202124;
      --text-muted: #5f6368;
      --score-bg: #e8f0fe;
      --score-color: #1a73e8;
      --shadow: 0 1px 4px rgba(0,0,0,.10), 0 2px 8px rgba(0,0,0,.06);
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── NAV ───────────────────────────────────────── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      height: 56px;
      gap: 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    nav .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    nav a {
      text-decoration: none;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background .15s, color .15s;
    }
    nav a:hover { background: #f1f3f4; color: var(--text); }
    nav a.active { color: var(--primary); }

    /* ── DOMAIN SELECTOR ───────────────────────────── */
    .domain-selector {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .domain-selector label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .domain-select {
      font-size: 13px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1.5px solid var(--primary);
      color: var(--primary);
      background: #e8f0fe;
      cursor: pointer;
      outline: none;
      transition: background .15s;
    }
    .domain-select:hover { background: #d2e3fc; }

    /* ── MAIN ──────────────────────────────────────── */
    main {
      max-width: 1140px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    /* ── BUTTONS ───────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 22px;
      border: none;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background .18s, box-shadow .18s;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover { background: var(--primary-hover); box-shadow: 0 2px 8px rgba(26,115,232,.4); }

    /* ── CARD ──────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow);
    }

    /* ── BADGE ─────────────────────────────────────── */
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--score-bg);
      color: var(--score-color);
    }

    /* ── ALERT ─────────────────────────────────────── */
    .alert {
      padding: 14px 18px;
      border-radius: var(--radius);
      margin-bottom: 20px;
      font-size: 14px;
    }
    .alert-error { background: #fce8e6; color: #c5221f; border: 1px solid #f5c6c4; }
    .alert-info  { background: #e8f0fe; color: #174ea6; border: 1px solid #c5d8fc; }

    /* ── PAGE LOADER ───────────────────────────────── */
    #page-loader {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(248,249,250,.72);
      backdrop-filter: blur(2px);
    }
    #page-loader.active { display: block; }

    /* top progress bar */
    #loader-bar {
      position: absolute;
      top: 0; left: 0;
      height: 3px;
      width: 0%;
      background: var(--primary);
      border-radius: 0 3px 3px 0;
      box-shadow: 0 0 8px rgba(26,115,232,.6);
      transition: width .3s ease;
    }
    #loader-bar.indeterminate {
      animation: bar-slide 1.5s ease-in-out infinite;
      width: 30% !important;
    }

    /* spinner */
    #loader-spinner {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .spinner-ring {
      width: 44px; height: 44px;
      border: 4px solid #e0e0e0;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    .spinner-label {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: .2px;
    }

    @keyframes spin      { to { transform: rotate(360deg); } }
    @keyframes bar-slide {
      0%   { left: -30%; width: 30%; }
      60%  { left: 60%;  width: 40%; }
      100% { left: 100%; width: 30%; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <!-- Page loader (shown on form submit / navigation) -->
  <div id="page-loader">
    <div id="loader-bar"></div>
    <div id="loader-spinner">
      <div class="spinner-ring"></div>
      <span class="spinner-label">Пошук…</span>
    </div>
  </div>

  <nav>
    <a class="logo" href="/?domain={{ current_domain }}">🔍 KB Search</a>
    <a href="/?domain={{ current_domain }}" {% if request.path == '/' %}class="active"{% endif %}>Пошук</a>
    <a href="/documents?domain={{ current_domain }}" {% if request.path == '/documents' %}class="active"{% endif %}>Документи</a>
    <a href="/raw?domain={{ current_domain }}" {% if request.path == '/raw' %}class="active"{% endif %}>Файли</a>
    <a href="/build?domain={{ current_domain }}" {% if request.path == '/build' %}class="active"{% endif %}>Індекси</a>
    <a href="/benchmark?domain={{ current_domain }}" {% if request.path == '/benchmark' %}class="active"{% endif %}>Benchmark</a>
    <a href="/benchmark/selection?domain={{ current_domain }}" {% if request.path == '/benchmark/selection' %}class="active"{% endif %}>Вибір моделі</a>
    <div class="domain-selector">
      <label for="domainSwitch">Домен:</label>
      <select id="domainSwitch" class="domain-select" onchange="switchDomain(this.value)">
        {% for dom in domains %}
        <option value="{{ dom.id }}" {% if dom.id == current_domain %}selected{% endif %}>{{ dom.label }}</option>
        {% endfor %}
      </select>
    </div>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    function switchDomain(domainId) {
      const url = new URL(window.location.href);
      url.searchParams.set('domain', domainId);
      // Strip page-specific params that may not apply cross-domain
      url.searchParams.delete('q');
      url.searchParams.delete('model');
      url.searchParams.delete('source');
      window.location.href = url.toString();
    }
  </script>

  <script>
  /* ── Page Loader ──────────────────────────────────────────────────────── */
  (function () {
    var loader  = document.getElementById('page-loader');
    var bar     = document.getElementById('loader-bar');
    var label   = document.querySelector('#loader-spinner .spinner-label');

    var _raf;
    var _showTimer;
    var _pct = 0;
    var _pending = false;

    function startProgress(text) {
      _pending = true;
      if (label) label.textContent = text || 'Завантаження…';
      bar.classList.remove('indeterminate');
      _pct = 0;
      bar.style.transition = '';
      bar.style.width = '0%';

      // Only show the loader after 500 ms – instant loads will never see it
      _showTimer = setTimeout(function () {
        if (!_pending) return;
        loader.classList.add('active');

        // Smoothly advance to ~85% then stall
        (function tick() {
          if (!_pending) return;
          if (_pct < 30)       _pct += 3;
          else if (_pct < 60)  _pct += 1.5;
          else if (_pct < 85)  _pct += 0.5;
          else return; // stall – wait for page load
          bar.style.width = _pct + '%';
          _raf = requestAnimationFrame(function () { setTimeout(tick, 80); });
        }());
      }, 500);
    }

    function finish() {
      _pending = false;
      clearTimeout(_showTimer);
      cancelAnimationFrame(_raf);
      if (!loader.classList.contains('active')) return; // never shown – nothing to hide
      bar.style.transition = 'width .2s ease';
      bar.style.width = '100%';
      setTimeout(function () { loader.classList.remove('active'); }, 250);
    }

    // Show loader on any form submit, with context-aware label
    document.addEventListener('submit', function (e) {
      var form = e.target;
      var action = (form.getAttribute('action') || '').split('?')[0];
      var isSearch = (action === '/' || action === '' || action.endsWith('/'));
      startProgress(isSearch ? 'Пошук…' : 'Завантаження…');
    }, true);

    // Show loader on nav links that cause full-page navigation (not anchors/JS)
    document.addEventListener('click', function (e) {
      var link = e.target.closest('a[href]');
      if (!link) return;
      var href = link.getAttribute('href') || '';
      // Skip anchors, javascript: links, and new-tab
      if (href.startsWith('#') || href.startsWith('javascript:')) return;
      if (link.target === '_blank') return;
      startProgress('Завантаження…');
    }, true);

    // Hide loader if user navigates back (bfcache restore)
    window.addEventListener('pageshow', function (e) {
      if (e.persisted) finish();
    });

    // Hide on actual DOMContentLoaded (covers all normal loads)
    document.addEventListener('DOMContentLoaded', finish);
  }());
  </script>
</body>
</html>
